name: Generate PDF Documentation

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  generate-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for PDF generation
        run: npx puppeteer browsers install chrome

      - name: Generate individual PDFs
        run: npm run pdf:all

      - name: Generate combined PDF
        run: npm run pdf:combined

      - name: Upload PDFs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pdfs
          path: pdf-exports/
          retention-days: 30

      - name: Upload to release (if release event)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pdf-exports/TrickBook-Documentation-Complete.pdf
